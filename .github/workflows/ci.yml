name: SmartHunt CI

on:
  push:
    branches: [main, develop]

  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check --target-version py312 .

      - name: Compile
        run: uv run python -m compileall src

      - name: Pytest
        run: uv run pytest --envfile=../.env

      - name: Helm Lint
        run: helm lint ../helm/smarthunt
