name: Container

on:

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Docker Build

        run: |

          docker build \
          -t smarthunt-backend:${{ github.sha }} \
          backend

      - name: Verify Image

        run: |

          docker images | grep smarthunt-backend
