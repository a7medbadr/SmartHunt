{{ if .Values.route.enabled }}

apiVersion: route.openshift.io/v1
kind: Route

metadata:

  name: {{ include "smarthunt.fullname" . }}

spec:

  to:

    kind: Service

    name: {{ include "smarthunt.fullname" . }}

  port:

    targetPort: {{ .Values.service.port }}

  tls:

    termination: edge

    insecureEdgeTerminationPolicy: Redirect

{{ end }}
