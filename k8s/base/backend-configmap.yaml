apiVersion: v1
kind: ConfigMap

metadata:
  name: smarthunt-config
  labels:
    app: smarthunt
    component: backend

data:

  APP_NAME: "SmartHunt"

  APP_ENV: "production"

  APP_DEBUG: "false"

  LOG_LEVEL: "INFO"

  HOST: "0.0.0.0"

  PORT: "8000"

  DATABASE_ECHO: "false"

  JWT_ALGORITHM: "HS256"

  ACCESS_TOKEN_EXPIRE_MINUTES: "60"

  TZ: "UTC"
