apiVersion: apps/v1
kind: Deployment
metadata:
  name: smarthunt-backend
  labels:
    app: smarthunt
    component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: smarthunt
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: smarthunt
        component: backend
    spec:
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/a-badr-dev/smarthunt-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: smarthunt-config
        - secretRef:
            name: smarthunt-secret
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8000
          initialDelaySeconds: 20
          timeoutSeconds: 2
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 8000
          initialDelaySeconds: 10
          timeoutSeconds: 2
          periodSeconds: 5
        startupProbe:
          httpGet:
            path: /api/v1/health/live
            port: 8000
          failureThreshold: 30
          periodSeconds: 5
