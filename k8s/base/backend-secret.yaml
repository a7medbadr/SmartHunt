apiVersion: v1
kind: Secret
metadata:
  name: smarthunt-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@smarthunt-postgres:5432/smarthunt"
  REDIS_URL: "redis://smarthunt-redis:6379/0"
  SECRET_KEY: "super-secret-key-change-me-in-production"
  JWT_SECRET_KEY: "another-super-secret-key-change-me"
